<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.form-wrap{width:100%;max-width:480px}
.form-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.form-header{padding:32px 28px 24px;color:#fff}
.form-header h1{font-size:22px;font-weight:700;margin-bottom:6px;line-height:1.3}
.form-header p{font-size:14px;opacity:.85}
.form-body{padding:28px}
.field-group{margin-bottom:18px}
.field-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.field-required{color:#ef4444;margin-left:2px}
.field-input,.field-select,.field-textarea{
  width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;
  font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;
  background:#fafafa;color:#111;
}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--color);background:#fff;box-shadow:0 0 0 3px rgba(var(--color-rgb),.12)}
.field-textarea{resize:vertical;min-height:90px}
.submit-btn{
  width:100%;padding:13px;background:var(--color);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:opacity .15s;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:8px
}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.form-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.form-success{text-align:center;padding:32px 20px;display:none}
.form-success .check{width:64px;height:64px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#16a34a}
.form-success h2{font-size:20px;font-weight:700;margin-bottom:8px;color:#111}
.form-success p{font-size:14px;color:#6b7280}
.form-footer{text-align:center;margin-top:16px;font-size:12px;color:#9ca3af}
.form-footer a{color:#9ca3af;text-decoration:none}
.loading-wrap{text-align:center;padding:48px 20px;color:#6b7280}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:var(--color);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="form-wrap">
  <div class="form-card" id="form-card">
    <div class="loading-wrap">
      <div class="spinner" style="--color:#185FA5"></div>
      <div>Carregando formulário...</div>
    </div>
  </div>
  <div class="form-footer">Powered by <a href="https://nexacrm.ia.br" target="_blank">NexaAI CRM</a></div>
</div>

<script>
const API = 'https://flowai-server-production.up.railway.app';
const params = new URLSearchParams(location.search);
const TENANT_ID = params.get('t');
const FORM_ID   = params.get('f');

async function loadForm() {
  if (!TENANT_ID || !FORM_ID) {
    showError('Link inválido.');
    return;
  }
  try {
    const res  = await fetch(`${API}/api/forms/public/${TENANT_ID}/${FORM_ID}`);
    const form = await res.json();
    if (!res.ok || !form.id) { showError('Formulário não encontrado ou inativo.'); return; }
    renderForm(form);
  } catch(e) {
    showError('Erro ao carregar. Tente novamente.');
  }
}

function renderForm(form) {
  const color    = form.color || '#185FA5';
  const colorRgb = hexToRgb(color);
  document.documentElement.style.setProperty('--color', color);
  document.documentElement.style.setProperty('--color-rgb', colorRgb);
  document.title = form.name;

  const card = document.getElementById('form-card');
  card.innerHTML = `
    <div class="form-header" style="background:${color}">
      <h1>${form.name}</h1>
      ${form.description ? `<p>${form.description}</p>` : ''}
    </div>
    <div class="form-body">
      <div class="form-error" id="form-error"></div>
      ${(form.fields||[]).map(f => renderField(f)).join('')}
      <button class="submit-btn" id="submit-btn" onclick="submitForm(${JSON.stringify(form).replace(/</g,'\\u003c')})">
        <span>Enviar</span>
        <i class="ti ti-arrow-right"></i>
      </button>
    </div>
    <div class="form-success" id="form-success">
      <div class="check"><i class="ti ti-check"></i></div>
      <h2>Enviado com sucesso!</h2>
      <p>${form.thank_you_msg || 'Obrigado! Entraremos em contato em breve.'}</p>
    </div>`;
}

function renderField(f) {
  const req = f.required ? `<span class="field-required">*</span>` : '';
  if (f.type === 'textarea') return `
    <div class="field-group">
      <label class="field-label" for="${f.id}">${f.label}${req}</label>
      <textarea id="${f.id}" class="field-textarea" placeholder="${f.placeholder||''}" ${f.required?'required':''}></textarea>
    </div>`;
  if (f.type === 'select') return `
    <div class="field-group">
      <label class="field-label" for="${f.id}">${f.label}${req}</label>
      <select id="${f.id}" class="field-select" ${f.required?'required':''}>
        <option value="">Selecione...</option>
        ${(f.options||f.placeholder||'').split(',').filter(Boolean).map(o=>`<option value="${o.trim()}">${o.trim()}</option>`).join('')}
      </select>
    </div>`;
  const inputType = f.type==='email'?'email':f.type==='phone'?'tel':'text';
  return `
    <div class="field-group">
      <label class="field-label" for="${f.id}">${f.label}${req}</label>
      <input id="${f.id}" class="field-input" type="${inputType}" placeholder="${f.placeholder||''}" ${f.required?'required':''}>
    </div>`;
}

async function submitForm(form) {
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('form-error');
  errEl.style.display = 'none';

  // Validar campos obrigatórios
  const body = {};
  for (const f of form.fields||[]) {
    const el = document.getElementById(f.id);
    if (!el) continue;
    const val = el.value.trim();
    if (f.required && !val) {
      errEl.textContent = `O campo "${f.label}" é obrigatório.`;
      errEl.style.display = 'block';
      el.focus();
      return;
    }
    body[f.id] = val;
    // Também mapear por tipo para o backend reconhecer
    if (f.type === 'name')  body.name  = val;
    if (f.type === 'phone') body.phone = val;
    if (f.type === 'email') body.email = val;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></div>';

  try {
    const res  = await fetch(`${API}/api/forms/submit/${TENANT_ID}/${form.id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.success) {
      document.querySelector('.form-body').style.display  = 'none';
      document.getElementById('form-success').style.display = 'block';
      document.querySelector('.form-header').style.display = 'none';
      if (data.redirect_url) {
        setTimeout(() => { window.location.href = data.redirect_url; }, 2000);
      }
    } else {
      errEl.textContent = data.error || 'Erro ao enviar. Tente novamente.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<span>Enviar</span><i class="ti ti-arrow-right"></i>';
    }
  } catch(e) {
    errEl.textContent = 'Erro de conexão. Tente novamente.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<span>Enviar</span><i class="ti ti-arrow-right"></i>';
  }
}

function showError(msg) {
  document.getElementById('form-card').innerHTML = `
    <div style="padding:48px 28px;text-align:center;color:#6b7280">
      <i class="ti ti-alert-circle" style="font-size:40px;color:#ef4444;display:block;margin-bottom:12px"></i>
      <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:6px">Oops!</div>
      <div style="font-size:13px">${msg}</div>
    </div>`;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

loadForm();
</script>
</body>
</html>
